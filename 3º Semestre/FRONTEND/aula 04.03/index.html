<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéMarket</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="https://play.pokemonshowdown.com/sprites/itemicons/poke-ball.png">
        <h1>PokéMarket</h1>
    </div>

    <button onclick="abrirCarrinho()" class="btnCarrinho">
        <img src="https://img.icons8.com/ios-filled/100/000000/shopping-cart.png">
    </button>
</header>

<p id="mensagem" class="mensagem"></p>

<section class="container" id="listaProdutos"></section>

<div class="modal" id="modalCarrinho">
  <div class="modal-content">
    <h2>Seu Carrinho</h2>
    <table id="dadosCarrinho"></table>
    <p id="total"></p>
    <div class="actions">
      <button class="primary" onclick="finalizar()">Fazer pedido</button>
      <button onclick="fecharCarrinho()">Cancelar</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
