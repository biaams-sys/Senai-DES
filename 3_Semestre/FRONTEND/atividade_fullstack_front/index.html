<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfumes Store - Gerenciador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Perfumes Store - Gerenciador</h1>
        </header>
        <button class="btn-add" onclick="openModal('addModal')">Adicionar Novo Perfume</button>
        
        <div class="perfumes-grid" id="perfumesGrid">
            <!-- Perfumes serão inseridos aqui -->
        </div>
    </div>

    <!-- Modal Adicionar Perfume -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="closeModal('addModal')">&times;</span>
                <h2>Novo Perfume</h2>
            </div>
            <div class="modal-body">
                <form id="perfumeForm">
                    <div class="form-group">
                        <label>Nome do Perfume *</label>
                        <input type="text" id="nome" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Categoria *</label>
                        <select id="categoriaId" required>
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Marca *</label>
                        <select id="marcaId" required>
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Preço (R$) *</label>
                        <input type="number" id="preco" step="0.01" min="0" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Tamanho *</label>
                        <select id="tamanho" required>
                            <option value="">Selecione...</option>
                            <option value="30ml">30ml</option>
                            <option value="50ml">50ml</option>
                            <option value="100ml">100ml</option>
                            <option value="200ml">200ml</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea id="descricao" placeholder="Descreva o perfume..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addModal')">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="salvarPerfume()">Salvar Perfume</button>
            </div>
        </div>
    </div>

    <!-- Modal Detalhes Perfume -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close" onclick="closeModal('detailsModal')">&times;</span>
                <h2>Detalhes do Perfume</h2>
            </div>
            <div class="modal-body perfume-details" id="perfumeDetails">
                <!-- Detalhes serão inseridos aqui -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('detailsModal')">Fechar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
