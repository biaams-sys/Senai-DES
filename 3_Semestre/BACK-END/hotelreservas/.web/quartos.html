<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Quarto</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Cadastrar Novo Quarto</h2>

    <div class="form-group">
        <label for="quarto-numero">Número do Quarto:</label>
        <input type="text" id="quarto-numero" placeholder="Ex: 101">
    </div>

    <div class="form-group">
        <label for="quarto-tipo">Tipo do Quarto:</label>
        <input type="text" id="quarto-tipo" placeholder="Ex: Standard, Luxo">
    </div>
    <button onclick="salvarQuarto()">Cadastrar</button>
    <a href="index.html" class="btn-secondary">Voltar</a>

    <script src="script.js"></script>
</body>

</html>
